<form class="register-form" (ngSubmit)="submit()">
  <h2>Registrieren</h2>

  <div class="form-group">
    <label for="firstname">Vorname</label>
    <input placeholder="Max" id="firstname" type="text" [(ngModel)]="user.firstname" name="firstname" required>
  </div>
  <div class="form-group">
    <label for="lastname">Nachname</label>
    <input placeholder="Mustermann" id="lastname" type="text" [(ngModel)]="user.lastname" name="lastname" required>
  </div>
  <div class="form-group">
    <label for="email">E-Mail</label>
    <input placeholder="max@mustermail.de" id="email" type="email" [(ngModel)]="user.email" name="email" required>
  </div>
  <div class="form-group">
    <label for="password">Passwort</label>
    <input placeholder="********" id="password" type="password" [(ngModel)]="user.passwordhash" name="passwordhash" required>
  </div>
  <div class="form-group">
    <label for="passwordRepeat">Passwort bestätigen</label>
    <input placeholder="********" id="passwordRepeat" type="password" [(ngModel)]="passwordRepeat" name="passwordRepeat" required>
  </div>
  <div class="form-group">
    <label for="birthdate">Geburtsdatum</label>
    <input type="date" [(ngModel)]="formattedBirthdate" name="birthdate">
  </div>
  <button type="submit" class="register-button">Konto erstellen</button>
</form>

<div *ngIf="errMessage" class="error">
  <p>{{ errMessage }}</p>
</div>
<div *ngIf="successMessage" class="success">
  <p>{{ successMessage }}</p>
</div>

<p>Bereits registriert? <a href="/login">Anmelden</a></p>
