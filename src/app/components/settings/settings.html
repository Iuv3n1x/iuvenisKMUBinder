<div class="settings-page">
  <div class="settings-container">

    <h1>Einstellungen</h1>

    <form>

      <div class="profileSettings">
        <h3>Profilinformationen</h3>

        <div class="inputField">
          <label for="firstname">Vorname</label>
          <input id="firstname" name="firstname" type="text" required>
        </div>

        <div class="inputField">
          <label for="lastname">Name</label>
          <input id="lastname" name="lastname" type="text" required>
        </div>

        <div class="inputField">
          <label for="email">E-Mail</label>
          <input id="email" name="email" type="email" required>
        </div>

        <div class="passwordChange">
          <label for="password">Neues Passwort</label>
          <input id="password" name="password" type="password">

          <label for="passwordConfirm">Passwort bestätigen</label>
          <input id="passwordConfirm" name="passwordConfirm" type="password">
        </div>
      </div>

      <div class="notificationSettings">
        <h3>Benachrichtigungseinstellungen</h3>

        <div class="inputField">
          <label for="emailNotifications">E-Mail-Benachrichtigungen</label>
          <input id="emailNotifications" name="emailNotifications" type="checkbox">
        </div>

        <div class="inputField">
          <label for="smsNotifications">SMS-Benachrichtigungen</label>
          <input id="smsNotifications" name="smsNotifications" type="checkbox">
        </div>
      </div>

      <div class="appearanceSettings">
        <h3>Darstellungseinstellungen</h3>

        <div class="inputField">
          <label for="theme">Thema</label>
          <select id="theme" name="theme">
            <option value="light">Hell</option>
            <option value="dark">Dunkel</option>
          </select>
        </div>
      </div>

      <button type="submit" id="saveChangesButton">
        Änderungen speichern
      </button>

    </form>

    <div class="deleteAccount">
      <h3>Account löschen</h3>

      <p>
        Möchten Sie Ihren Account wirklich löschen?
        Diese Aktion kann nicht rückgängig gemacht werden.
      </p>

      <input
        type="password"
        id="deleteAccountPassword"
        name="deleteAccountPassword"
        placeholder="Passwort eingeben, um zu bestätigen"
      >

      <button id="deleteAccountButton">
        Account löschen
      </button>
    </div>

  </div>
</div>
