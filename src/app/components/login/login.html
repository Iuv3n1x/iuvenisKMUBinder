<form class="register-form" (ngSubmit)="login()" #form="ngForm">
    <h2>Anmelden</h2>

    <div class="form-group">
        <label for="email">E-Mail</label>
        <input placeholder="max@mustermail.de" id="email" type="email" [(ngModel)]="email" name="email" required>
    </div>
    <div class="form-group">
        <label for="password">Passwort</label>
        <input placeholder="********" id="password" type="password" [(ngModel)]="password" name="password" required>
    </div>

    <input id="stayLoged" name="stayLoged" type="checkbox" [(ngModel)]="stayLogged">
    <label for="stayLoged">Angemeldet bleiben?</label>
    <p></p>

    <button type="submit" class="register-button">Anmelden</button>
</form>

<div *ngIf="errMessage" class="error">
  <p>{{ errMessage }}</p>
</div>

<p>Noch kein Konto? <a href="/signup">Konto erstellen</a></p>
