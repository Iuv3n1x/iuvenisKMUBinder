<div class="auth-page mode-signup">
  <section class="brand-panel">
    <div class="brand-inner">
      <p class="eyebrow">Willkommen</p>
      <h1>{{ siteName }}</h1>
      <p class="description">Klarheit ist Design.</p>

      <ul>
        <li *ngFor="let detail of details">{{ detail }}</li>
      </ul>
    </div>
  </section>

  <section class="form-panel">
    <div class="form-card">
      <h2>Admin-Einrichtung</h2>
      <p class="subtitle">Füllen Sie die Felder aus um Ihren Account anzulegen.</p>

      <form (ngSubmit)="signup()" #signupForm="ngForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="firstname">Vorname</label>
            <input id="firstname" type="text" name="firstname" placeholder="Max" [(ngModel)]="admin.firstname" required />
          </div>

          <div class="form-group">
            <label for="lastname">Nachname</label>
            <input id="lastname" type="text" name="lastname" placeholder="Mustermann" [(ngModel)]="admin.lastname" required />
          </div>
        </div>

        <div class="form-group">
          <label for="companyName">Name Ihres Unternehmens</label>
          <input id="companyName" type="text" name="companyName" [(ngModel)]="companyName" required />
        </div>

        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" name="signupEmail" placeholder="max@example.com" [(ngModel)]="admin.email" required />
        </div>

        <div class="form-group">
          <label for="signupPassword">Passwort</label>
          <input id="signupPassword" type="password" name="signupPassword" placeholder="********" [(ngModel)]="admin.passwordhash" required />
        </div>

        <div class="form-group">
          <label for="passwordRepeat">Passwort bestätigen</label>
          <input id="passwordRepeat" type="password" name="passwordRepeat" placeholder="********" [(ngModel)]="passwordRepeat" required />
        </div>

        <div class="form-group">
          <label for="birthdate">Geburtsdatum</label>
          <input id="birthdate" type="date" name="birthdate" [(ngModel)]="formattedBirthdate" required />
        </div>

        <div class="form-group">
          <label for="streakLimit">Seriendauer</label>
          <h2>{{ streakLimit }}</h2>
          <input id="streakLimit" type="range" min="1" max="60" name="streakLimit" [(ngModel)]="streakLimit" required />
        </div>

        <div class="form-group">
          <label for="starterCode">Startercode</label>
          <input id="starterCode" type="text" name="starterCode" [(ngModel)]="starterCode" required />
        </div>

        <button type="submit" class="submit-button">Konto erstellen</button>
      </form>

      <p *ngIf="errMessage" class="feedback error">{{ errMessage }}</p>
      <p *ngIf="successMessage" class="feedback success">{{ successMessage }}</p>
    </div>
  </section>
</div>
